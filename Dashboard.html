<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時數據儀表板 | AI 工作坊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-color: #F9F7F2; --text-main: #2C2C2C; --line-color: #D1CEC7; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Noto Serif TC', serif; letter-spacing: 0.05em; }
        .sans { font-family: 'Noto Sans TC', sans-serif; }
        .stat-card { border-bottom: 1px solid var(--line-color); padding: 2rem 0; }
        #loading { position: fixed; inset: 0; background: var(--bg-color); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="p-8 md:p-20">

    <div id="loading">
        <div class="animate-pulse mb-2">正在讀取雲端數據...</div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="mb-20 border-b border-black pb-8">
            <p class="sans text-[10px] uppercase tracking-[0.4em] mb-2 opacity-40">Analytics</p>
            <h1 class="text-3xl md:text-4xl font-medium">即時報名數據儀表板</h1>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-20">
            <div class="stat-card">
                <p class="sans text-[10px] opacity-40 uppercase mb-4">總報名人數</p>
                <p id="total-count" class="text-6xl font-light">0</p>
            </div>
            <div class="stat-card">
                <p class="sans text-[10px] opacity-40 uppercase mb-4">平均信心指數</p>
                <p id="avg-confidence" class="text-6xl font-light">0.0</p>
            </div>
            <div class="stat-card">
                <p class="sans text-[10px] opacity-40 uppercase mb-4">主要痛點</p>
                <p id="top-pain" class="text-2xl font-light mt-2">—</p>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-20">
            <div class="h-[300px]">
                <h3 class="text-[10px] uppercase tracking-widest opacity-40 mb-8 border-b pb-2">職稱分佈</h3>
                <canvas id="roleChart"></canvas>
            </div>
            <div class="h-[300px]">
                <h3 class="text-[10px] uppercase tracking-widest opacity-40 mb-8 border-b pb-2">AI 使用頻率</h3>
                <canvas id="freqChart"></canvas>
            </div>
            <div class="md:col-span-2">
                <h3 class="text-[10px] uppercase tracking-widest opacity-40 mb-8 border-b pb-2">工具接觸佔比</h3>
                <div id="tools-list" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
            </div>
        </section>

        <footer class="mt-40 pt-8 border-t border-zinc-200 flex justify-between">
            <p class="sans text-[9px] opacity-30 uppercase">Department of Medical Education</p>
            <button onclick="fetchData()" class="sans text-[9px] uppercase tracking-widest border border-black px-4 py-1 hover:bg-black hover:text-white transition-all">Refresh</button>
        </footer>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx_l3b9IgruXKd_RVEayFhUIAsd-TXy2p202U0gN3SQvThpw--NW8xeUO-MDRZ2d7MM/exec";
        let roleChart, freqChart;

        async function fetchData() {
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                if (Array.isArray(data)) render(data);
                else alert("目前尚無報名資料。");
            } catch (e) {
                console.error(e);
                alert("抓取失敗，請確認 Apps Script 已正確部署。");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function render(data) {
            if (data.length === 0) return;
            document.getElementById('total-count').innerText = data.length;

            let confSum = 0, roles = {}, freqs = {}, tools = {}, pains = {};
            
            data.forEach(item => {
                roles[item['職稱']] = (roles[item['職稱']] || 0) + 1;
                freqs[item['AI使用頻率']] = (freqs[item['AI使用頻率']] || 0) + 1;
                confSum += parseInt(item['信心分數'] || 0);
                
                if (item['曾經嘗試過的工具']) {
                    item['曾經嘗試過的工具'].split(', ').forEach(t => tools[t] = (tools[t] || 0) + 1);
                }
                if (item['最希望解決的痛點']) {
                    item['最希望解決的痛點'].split(', ').forEach(p => pains[p] = (pains[p] || 0) + 1);
                }
            });

            document.getElementById('avg-confidence').innerText = (confSum / data.length).toFixed(1);
            const sortedPains = Object.entries(pains).sort((a, b) => b[1] - a[1]);
            document.getElementById('top-pain').innerText = sortedPains[0] ? sortedPains[0][0] : "—";

            updateCharts(roles, freqs);
            updateTools(tools, data.length);
        }

        function updateCharts(roles, freqs) {
            const chartConfig = (ctx, type, labels, data) => new Chart(ctx, {
                type,
                data: { labels, datasets: [{ data, backgroundColor: '#000', borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: type === 'doughnut', position: 'bottom' } } }
            });

            if (roleChart) roleChart.destroy();
            roleChart = chartConfig(document.getElementById('roleChart'), 'doughnut', Object.keys(roles), Object.values(roles));
            
            if (freqChart) freqChart.destroy();
            freqChart = chartConfig(document.getElementById('freqChart'), 'bar', Object.keys(freqs), Object.values(freqs));
        }

        function updateTools(tools, total) {
            const list = document.getElementById('tools-list');
            list.innerHTML = Object.entries(tools).map(([name, count]) => `
                <div class="text-center p-4 border border-zinc-100 bg-white">
                    <p class="sans text-[9px] opacity-40 uppercase mb-1">${name}</p>
                    <p class="text-xl font-light">${Math.round(count/total*100)}%</p>
                </div>
            `).join('');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
