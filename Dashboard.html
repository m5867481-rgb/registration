<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時數據儀表板 | AI 教學行政工作坊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #F9F7F2;
            --text-main: #2C2C2C;
            --line-color: #D1CEC7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Serif TC', serif;
            letter-spacing: 0.05em;
        }

        .sans { font-family: 'Noto Sans TC', sans-serif; }

        .stat-card {
            border-bottom: 1px solid var(--line-color);
            padding: 2rem 0;
            transition: all 0.5s ease;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body class="p-8 md:p-20">

    <div id="loading-overlay">
        <div class="animate-pulse text-lg mb-2">正在同步雲端數據...</div>
        <p class="sans text-[10px] opacity-40 uppercase tracking-widest">Wabi-Sabi Dashboard</p>
    </div>

    <div class="max-w-5xl mx-auto">
        
        <!-- Header -->
        <header class="mb-20">
            <div class="flex justify-between items-end border-b border-black pb-8">
                <div>
                    <p class="sans text-xs uppercase tracking-widest opacity-60 mb-2">Real-time Analytics</p>
                    <h1 class="text-3xl md:text-4xl font-medium">即時報名數據儀表板</h1>
                </div>
                <div class="text-right hidden md:block">
                    <p class="sans text-xs opacity-40 uppercase">Last Updated</p>
                    <p id="update-time" class="sans text-sm">—</p>
                </div>
            </div>
        </header>

        <!-- Summary Section -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-20">
            <div class="stat-card">
                <p class="sans text-xs opacity-50 uppercase mb-4">總報名人數</p>
                <p id="total-count" class="text-6xl font-light">0</p>
            </div>
            <div class="stat-card">
                <p class="sans text-xs opacity-50 uppercase mb-4">平均信心指數</p>
                <p id="avg-confidence" class="text-6xl font-light">0.0</p>
            </div>
            <div class="stat-card">
                <p class="sans text-xs opacity-50 uppercase mb-4">最主要痛點</p>
                <p id="top-pain" class="text-2xl md:text-3xl font-light mt-2">—</p>
            </div>
        </section>

        <!-- Charts Grid -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-20">
            
            <!-- Role Distribution -->
            <div>
                <h3 class="text-xs uppercase tracking-widest opacity-60 mb-8 border-b border-zinc-200 pb-2">職稱分佈</h3>
                <div class="chart-container">
                    <canvas id="roleChart"></canvas>
                </div>
            </div>

            <!-- AI Frequency -->
            <div>
                <h3 class="text-xs uppercase tracking-widest opacity-60 mb-8 border-b border-zinc-200 pb-2">AI 使用頻率</h3>
                <div class="chart-container">
                    <canvas id="freqChart"></canvas>
                </div>
            </div>

            <!-- Tool Experience -->
            <div class="md:col-span-2">
                <h3 class="text-xs uppercase tracking-widest opacity-60 mb-8 border-b border-zinc-200 pb-2">AI 工具接觸率</h3>
                <div id="tools-list" class="grid grid-cols-2 md:grid-cols-5 gap-8">
                    <!-- JS injects content -->
                </div>
            </div>

        </section>

        <footer class="mt-40 border-t border-zinc-200 pt-8 pb-20 flex justify-between items-center">
            <p class="sans text-[10px] opacity-40">此儀表板僅供奇美醫院教學部管理使用</p>
            <button onclick="fetchData()" class="sans text-[10px] uppercase tracking-widest border border-black px-4 py-2 hover:bg-black hover:text-white transition-all">
                手動重新整理
            </button>
        </footer>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx_l3b9IgruXKd_RVEayFhUIAsd-TXy2p202U0gN3SQvThpw--NW8xeUO-MDRZ2d7MM/exec";

        let roleChart, freqChart;

        async function fetchData() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // 檢查資料是否為陣列 (防止 Apps Script 回傳錯誤物件)
                if (Array.isArray(data)) {
                    renderDashboard(data);
                } else if (data.result === "error") {
                    console.error("API Error:", data.message);
                    alert("Google Sheets 錯誤: " + data.message);
                } else {
                    console.error("Unexpected Data Format:", data);
                    alert("收到非預期的資料格式，請確認 Apps Script 部署與試算表內容。");
                }
                
                overlay.style.display = 'none';
                document.getElementById('update-time').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Data Fetch Error:", error);
                overlay.style.display = 'none';
                alert("無法獲取資料。請確認 Apps Script 已部署為「網頁應用程式」且權限設為「任何人」。");
            }
        }

        function renderDashboard(data) {
            // 安全檢查：若資料為空陣列
            if (!data || data.length === 0) {
                document.getElementById('total-count').innerText = "0";
                document.getElementById('avg-confidence').innerText = "0.0";
                document.getElementById('top-pain').innerText = "尚無資料";
                return;
            }

            // 1. 總人數
            document.getElementById('total-count').innerText = data.length;

            // 2. 數據統計邏輯
            const roles = {};
            const freqs = {};
            const toolsCount = {};
            const painsCount = {};
            let totalConfidence = 0;
            let validConfidenceCount = 0;

            data.forEach(item => {
                // 職稱 (確保欄位名稱與試算表一致)
                const roleKey = item['職稱'] || '未知';
                roles[roleKey] = (roles[roleKey] || 0) + 1;

                // 頻率
                const freqKey = item['AI使用頻率'] || '未知';
                freqs[freqKey] = (freqs[freqKey] || 0) + 1;

                // 信心 (處理可能的非數字或空白)
                const conf = parseInt(item['信心分數']);
                if (!isNaN(conf)) {
                    totalConfidence += conf;
                    validConfidenceCount++;
                }

                // 工具 (多選拆分，需對應表頭「曾經嘗試過的工具」)
                const toolsField = item['曾經嘗試過的工具'];
                if (toolsField) {
                    toolsField.toString().split(', ').forEach(t => {
                        const tool = t.trim();
                        if (tool) toolsCount[tool] = (toolsCount[tool] || 0) + 1;
                    });
                }

                // 痛點 (多選拆分，需對應表頭「最希望解決的痛點」)
                const painsField = item['最希望解決的痛點'];
                if (painsField) {
                    painsField.toString().split(', ').forEach(p => {
                        const pain = p.trim();
                        if (pain) painsCount[pain] = (painsCount[pain] || 0) + 1;
                    });
                }
            });

            // 3. 平均信心
            document.getElementById('avg-confidence').innerText = validConfidenceCount > 0 
                ? (totalConfidence / validConfidenceCount).toFixed(1) 
                : "0.0";

            // 4. 最大痛點
            const painKeys = Object.keys(painsCount);
            const topPain = painKeys.length > 0 
                ? painKeys.reduce((a, b) => painsCount[a] > painsCount[b] ? a : b) 
                : "尚無資料";
            document.getElementById('top-pain').innerText = topPain;

            // 5. 更新圖表
            updateRoleChart(roles);
            updateFreqChart(freqs);
            updateToolsList(toolsCount, data.length);
        }

        function updateRoleChart(roleData) {
            const ctx = document.getElementById('roleChart').getContext('2d');
            if (roleChart) roleChart.destroy();
            roleChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(roleData),
                    datasets: [{
                        data: Object.values(roleData),
                        backgroundColor: ['#000', '#666', '#999', '#CCC', '#EEE'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'right', labels: { font: { family: 'Noto Sans TC', size: 10 } } }
                    }
                }
            });
        }

        function updateFreqChart(freqData) {
            const ctx = document.getElementById('freqChart').getContext('2d');
            if (freqChart) freqChart.destroy();
            freqChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(freqData),
                    datasets: [{
                        label: '人數',
                        data: Object.values(freqData),
                        backgroundColor: '#000',
                        barThickness: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { font: { size: 10 }, stepSize: 1 } },
                        x: { ticks: { font: { family: 'Noto Sans TC', size: 10 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateToolsList(tools, total) {
            const container = document.getElementById('tools-list');
            container.innerHTML = '';
            const toolNames = Object.keys(tools);
            
            if (toolNames.length === 0) {
                container.innerHTML = '<p class="sans text-xs opacity-40">尚無工具使用數據</p>';
                return;
            }

            toolNames.forEach(name => {
                const percent = Math.round((tools[name] / total) * 100);
                const div = document.createElement('div');
                div.className = 'text-center p-4 border border-zinc-100 bg-white';
                div.innerHTML = `
                    <p class="sans text-[10px] opacity-50 mb-1 uppercase">${name}</p>
                    <p class="text-xl font-light">${percent}%</p>
                `;
                container.appendChild(div);
            });
        }

        // 初始化抓取
        window.onload = fetchData;
    </script>
</body>
</html>
